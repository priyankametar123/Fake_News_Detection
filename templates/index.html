<!DOCTYPE html>
<html>
<head>
    <title>Fake News Detector</title>
    <style>
        body { font-family: Arial; padding: 30px; background-color: #f9f9f9; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        textarea { width: 100%; height: 200px; margin-bottom: 10px; }
        input[type=submit] { padding: 10px 20px; }
        .result { font-size: 20px; margin-top: 20px; color: green; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Fake News Detection</h2>
        <form method="POST" action="/predict">
            <textarea name="news" placeholder="Paste news text here..." required></textarea>
            <br>
            <input type="submit" value="Predict">
        </form>
        {% if prediction %}
        <div class="result">Prediction: <strong>{{ prediction }}</strong></div>
        {% endif %}
    </div>
</body>
</html>
